<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDHD Agency Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    #chat-container {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      height: 90vh;
      display: flex;
      flex-direction: column;
    }
    #chat-header {
      background: #1a1a2e;
      color: white;
      padding: 20px;
      text-align: center;
    }
    #chat-header h2 { font-size: 20px; }
    #chat-header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .bot { background: #f0f0f0; align-self: flex-start; }
    .user {
      background: #1a1a2e;
      color: white;
      align-self: flex-end;
    }
    #input-area {
      display: flex;
      padding: 16px;
      border-top: 1px solid #eee;
      gap: 10px;
    }
    #user-input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    #send-btn {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #send-btn:hover { background: #2d2d5e; }
    .typing { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <h2>🛡️ DDHD Agency</h2>
      <p>Aerospace & Defense AI Assistant</p>
    </div>
    <div id="messages">
      <div class="message bot">Welcome to DDHD Agency! 👋</div>
      <div class="message bot">I assist with aerospace & defense procurement and AI automation.</div>
      <div class="message bot">How can I help you today?</div>
    </div>
    <div id="input-area">
      <input type="text" id="user-input" 
             placeholder="Ask about our services..." 
             onkeypress="if(event.key==='Enter') sendMessage()"/>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const webhookUrl = 'https://darintano.app.n8n.cloud/webhook/faa253f5-b50b-47d9-ae18-3a4e8e0949b5/chat';
    const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

    function addMessage(text, type) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message ' + type;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      addMessage(text, 'user');
      addMessage('Typing...', 'bot typing');

      try {
        const response = await fetch(webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chatInput: text,
            sessionId: sessionId
          })
        });

        const data = await response.json();
        
        // Remove typing indicator
        const typing = document.querySelector('.typing');
        if (typing) typing.remove();

        // Extract the actual response text
        const reply = data.output || data.text || data.message || 
                      data.response || JSON.stringify(data);
        addMessage(reply, 'bot');

      } catch (error) {
        const typing = document.querySelector('.typing');
        if (typing) typing.remove();
        addMessage('Sorry, there was an error. Please try again.', 'bot');
      }
    }
  </script>
</body>
</html>
